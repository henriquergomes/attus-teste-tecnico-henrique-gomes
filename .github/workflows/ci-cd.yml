name: CI/CD Pipeline

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Concede as permissões necessárias para o deploy no GitHub Pages
permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps

      - name: Executar testes (Vitest)
        run: npm run coverage

      - name: Build do projeto
        run: npx ng build --configuration production --base-href /${{ github.event.repository.name }}/

      - name: Salvar artefatos do build (para o deploy)
        uses: actions/upload-artifact@v5
        with:
          name: build-outputs
          path: dist/attus-app/browser/

  deploy:
    if: github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Lendo o repositório
        uses: actions/checkout@v5

      - name: Baixar artefatos do build
        uses: actions/download-artifact@v5
        with:
          name: build-outputs
          path: release/

      - name: Deploy para o GitHub Pages (branch gh-pages)
        uses: peaceiris/actions-gh-pages@v5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./release/
