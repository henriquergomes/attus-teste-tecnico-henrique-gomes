<mat-toolbar color="primary" class="app-toolbar">
  <div class="logo-container">
    <img src="assets/images/logo-attus.png" alt="Attus Logo" class="app-logo" />
  </div>
</mat-toolbar>

<mat-tab-group animationDuration="600ms">
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon>group</mat-icon>
      Listagem de Usuários
    </ng-template>
    <div class="tab-content">
      <app-user-list></app-user-list>
    </div>
  </mat-tab>

  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon>terminal</mat-icon>
      Exercícios Técnicos
    </ng-template>
    <div class="tab-content exercises-page">
      <div class="exercises-grid">
        <section class="exercise-section animate-in">
          <div class="section-header">
            <span class="badge">3.1</span>
            <h3>Signals Counter</h3>
          </div>
          <app-signals-counter></app-signals-counter>
        </section>

        <section class="exercise-section animate-in" style="animation-delay: 0.2s">
          <div class="section-header">
            <span class="badge">3.2</span>
            <h3>NgRx State Management</h3>
          </div>
          <div class="ngrx-info-card glass-premium">
            <p>
              A implementação completa de <strong>Actions, Reducers, Selectors</strong> e
              <strong>Effects</strong> para o To-do list foi realizada no código.
            </p>
            <p class="path-label"><mat-icon>folder</mat-icon> src/app/exercises/todo-ngrx</p>
          </div>
        </section>
      </div>
    </div>
  </mat-tab>
</mat-tab-group>
