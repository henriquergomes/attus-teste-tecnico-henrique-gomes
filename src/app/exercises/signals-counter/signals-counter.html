<div class="counter-card glass-effect">
  <h3><mat-icon>shopping_cart</mat-icon> Carrinho (Signals)</h3>

  <div class="items-list">
    @for (item of itens(); track item.id) {
      <div class="item-row">
        <div class="item-info">
          <span class="item-name">{{ item.nome }}</span>
          <span class="item-price">R$ {{ item.preco }}</span>
        </div>

        <div class="item-controls">
          <button
            mat-icon-button
            color="warn"
            (click)="remover(item.id)"
            [disabled]="item.quantidade === 0"
          >
            <mat-icon>remove_circle_outline</mat-icon>
          </button>
          <span class="item-qty">{{ item.quantidade }}</span>
          <button mat-icon-button color="primary" (click)="adicionar(item.id)">
            <mat-icon>add_circle_outline</mat-icon>
          </button>
        </div>
      </div>
    }
  </div>

  <div class="total-section">
    <span>Total</span>
    <span class="total-value">R$ {{ total() }}</span>
  </div>
</div>
